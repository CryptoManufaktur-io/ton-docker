x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: 100m
      max-file: "3"
      tag: '{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}'

services:
  ton-http-api-config:
    build:
      context: ./ton-http-api
      dockerfile: Dockerfile
    image: ton-http-api-config:local
    restart: "no"
    depends_on:
      ton:
        condition: service_started
    environment:
      - TON_CONTAINER=${TON_CONTAINER:-ton}
    volumes:
      - ton-api-config:/shared-config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    <<: *logging

  ton-http-api:
    image: toncenter/ton-http-api:latest
    container_name: ton-http-api
    restart: unless-stopped
    depends_on:
      ton-http-api-config:
        condition: service_completed_successfully
    ports:
      - ${TON_API_HTTP_PORT:-8081}:8081
    environment:
      - TON_API_CACHE_ENABLED=${TON_API_CACHE_ENABLED:-0}
      - TON_API_LOGS_JSONIFY=${TON_API_LOGS_JSONIFY:-0}
      - TON_API_LOGS_LEVEL=${TON_API_LOGS_LEVEL:-INFO}
      - TON_API_TONLIB_LITESERVER_CONFIG=/shared-config/local.config.json
      - TON_API_TONLIB_KEYSTORE=/tmp/ton_keystore/
      - TON_API_TONLIB_PARALLEL_REQUESTS_PER_LITESERVER=${TON_API_TONLIB_PARALLEL_REQUESTS_PER_LITESERVER:-50}
      - TON_API_TONLIB_REQUEST_TIMEOUT=${TON_API_TONLIB_REQUEST_TIMEOUT:-10}
      - TON_API_GET_METHODS_ENABLED=${TON_API_GET_METHODS_ENABLED:-1}
      - TON_API_JSON_RPC_ENABLED=${TON_API_JSON_RPC_ENABLED:-1}
      - TON_API_ROOT_PATH=${TON_API_ROOT_PATH:-/}
      - TON_API_WEBSERVERS_WORKERS=${TON_API_WEBSERVERS_WORKERS:-1}
      - TON_API_GUNICORN_FLAGS=${TON_API_GUNICORN_FLAGS:-}
    volumes:
      - ton-api-config:/shared-config:ro
    command: >-
      -c "gunicorn -k uvicorn.workers.UvicornWorker
      -w ${TON_API_WEBSERVERS_WORKERS:-1}
      --bind 0.0.0.0:8081 ${TON_API_GUNICORN_FLAGS}
      pyTON.main:app"
    healthcheck:
      test: curl -sS http://127.0.0.1:8081${TON_API_ROOT_PATH:-/}healthcheck || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    <<: *logging

volumes:
  ton-api-config:
